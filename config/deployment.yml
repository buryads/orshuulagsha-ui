apiVersion: apps/v1
kind: Deployment
metadata:
  name: buryads-ui
  labels:
    app: buryads-ui
  namespace: applications
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buryads-ui
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: buryads-ui
    spec:
      containers:
        - name: buryads-ui
          image: <IMAGE>
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: API_BASE_URL
              value: "https://tt.buryads.com"
          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
      imagePullSecrets:
        - name: dockerhub-secret
---
apiVersion: v1
kind: Service
metadata:
  name: buryads-ui-service
  namespace: applications
spec:
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
  selector:
    app: buryads-ui
---
apiVersion: v1
kind: Service
metadata:
  name: buryads-ui-service-proxy
  namespace: default
spec:
  type: ExternalName
  externalName: buryads-ui-service.applications.svc.cluster.local
